name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared
        run: npm run build --workspace @tmt/shared

      - name: Build backend
        run: npm run build --workspace @tmt/backend

      - name: Build frontend
        run: npm run build --workspace @tmt/frontend

      - name: Lint workspaces
        run: npm run lint
