name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Guard against legacy gh-pages source reconfiguration
        run: |
          if rg -n "actions/github-script@v7|peaceiris/actions-gh-pages|PUT /repos/\{owner\}/\{repo\}/pages|build_type:\s*legacy" .github/workflows --glob "!node.js.yml"; then
            echo "Legacy GitHub Pages branch-source reconfiguration detected. Use deploy-frontend-pages.yml artifact flow only."
            exit 1
          fi

      - name: Build shared
        run: npm run build --workspace @tmt/shared

      - name: Build backend
        run: npm run build --workspace @tmt/backend

      - name: Build frontend
        run: npm run build --workspace @tmt/frontend

      - name: Lint workspaces
        run: npm run lint
